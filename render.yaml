services:
  - type: web
    name: ansh-instagram-dm-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --access-logfile -
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GRAPH_API_VERSION
        value: v25.0
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: CLAUDE_MAX_TOKENS
        value: "120"
      - key: MAX_TURNS
        value: "20"
      - key: WORKER_THREADS
        value: "6"
      - key: MESSAGE_COALESCE_SECONDS
        value: "0.8"
      - key: MIN_REPLY_DELAY_SECONDS
        value: "2.5"
      - key: MAX_REPLY_DELAY_SECONDS
        value: "8.5"
      - key: DOUBLE_TEXT_DELAY_MIN_SECONDS
        value: "1.0"
      - key: DOUBLE_TEXT_DELAY_MAX_SECONDS
        value: "3.2"
      - key: OFFENSIVE_FLIP_CHANCE
        value: "0.13"
      - key: OFFENSIVE_FLIP_MIN_GAP
        value: "5"
      - key: RECENT_REPLY_CACHE_SIZE
        value: "250"
      - key: RECENT_REPLY_TTL_SECONDS
        value: "86400"
      - key: MAX_PENDING_MESSAGES
        value: "50"
      - key: MAX_SEEN_EVENTS
        value: "10000"
      - key: MAX_USER_TEXT_CHARS
        value: "1200"
      - key: SPAM_BURST_WINDOW_SECONDS
        value: "30"
      - key: SPAM_BURST_MAX_MESSAGES
        value: "5"
      - key: SPAM_REPEAT_WINDOW_SECONDS
        value: "600"
      - key: SPAM_REPEAT_MAX_MESSAGES
        value: "2"
      - key: SPAM_COOLDOWN_SECONDS
        value: "21600"
      - key: SESSION_IDLE_SECONDS
        value: "3600"
      - key: SESSION_COOLDOWN_SECONDS
        value: "21600"
      - key: MAX_REPLIES_PER_SESSION
        value: "20"
      - key: MAX_REPLIES_PER_24H
        value: "60"
      - key: MAX_GLOBAL_CLAUDE_CALLS_PER_MINUTE
        value: "20"
      - key: MAX_GLOBAL_CLAUDE_CALLS_PER_24H
        value: "300"
      - key: VERIFY_TOKEN
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_ACCOUNT_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
