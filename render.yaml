services:
  - type: web
    name: ansh-instagram-dm-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --access-logfile -
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GRAPH_API_VERSION
        value: v25.0
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: CLAUDE_MAX_TOKENS
        value: "140"
      - key: MAX_TURNS
        value: "20"
      - key: WORKER_THREADS
        value: "6"
      - key: MESSAGE_COALESCE_SECONDS
        value: "0.8"
      - key: MIN_REPLY_DELAY_SECONDS
        value: "2.0"
      - key: MAX_REPLY_DELAY_SECONDS
        value: "7.0"
      - key: DOUBLE_TEXT_DELAY_MIN_SECONDS
        value: "0.8"
      - key: DOUBLE_TEXT_DELAY_MAX_SECONDS
        value: "2.4"
      - key: MAX_PENDING_MESSAGES
        value: "100"
      - key: MAX_SEEN_EVENTS
        value: "10000"
      - key: MAX_USER_TEXT_CHARS
        value: "1600"
      - key: SPAM_BURST_WINDOW_SECONDS
        value: "20"
      - key: SPAM_BURST_MAX_MESSAGES
        value: "8"
      - key: SPAM_REPEAT_WINDOW_SECONDS
        value: "600"
      - key: SPAM_REPEAT_MAX_MESSAGES
        value: "4"
      - key: SPAM_COOLDOWN_SECONDS
        value: "900"
      - key: RECENT_REPLY_CACHE_SIZE
        value: "350"
      - key: RECENT_REPLY_TTL_SECONDS
        value: "86400"
      - key: CHATAK_LORE_CHANCE
        value: "0.025"
      - key: DRILL_REFERENCE_CHANCE
        value: "0.008"
      - key: VERIFY_TOKEN
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_ACCOUNT_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DIAGNOSTIC_TOKEN
        sync: false
